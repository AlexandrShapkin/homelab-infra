apiVersion: apps/v1
kind: Deployment
metadata:
  name: mikrotik-exporter
  namespace: monitoring
  labels:
    app: mikrotik-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mikrotik-exporter
  template:
    metadata:
      labels:
        app: mikrotik-exporter
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /config-global/_mktxp.conf /mktxp-config/_mktxp.conf
              cp /config-router/mktxp.conf /mktxp-config/mktxp.conf
              chown 1000:1000 /mktxp-config/_mktxp.conf
              chown 1000:1000 /mktxp-config/mktxp.conf
              chmod 644 /mktxp-config/_mktxp.conf
              chmod 644 /mktxp-config/mktxp.conf
          volumeMounts:
            - name: global-config
              mountPath: /config-global
            - name: router-config
              mountPath: /config-router
            - name: mktxp-workdir
              mountPath: /mktxp-config
      containers:
        - name: mikrotik-exporter
          image: ghcr.io/akpw/mktxp:latest
          ports:
            - containerPort: 49090
              name: metrics
          volumeMounts:
            - name: mktxp-workdir
              mountPath: /home/mktxp/mktxp
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 49090
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: global-config
          configMap:
            name: mikrotik-exporter-config
        - name: router-config
          secret:
            secretName: mikrotik-credentials
        - name: mktxp-workdir
          emptyDir: {}
